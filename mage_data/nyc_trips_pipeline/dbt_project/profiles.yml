# dbt Profile para NYC Trips
# Las credenciales se obtienen de variables de entorno

nyc_trips:
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'postgres') }}"
      port: 5432
      user: "{{ env_var('POSTGRES_USER', 'postgres') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'postgres') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'nyc_trips') }}"
      schema: public
      threads: 4
  target: dev
